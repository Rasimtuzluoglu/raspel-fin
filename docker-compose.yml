services:
  db:
    image: postgres:15
    container_name: cardtracker-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: cardtracker
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      TZ: Europe/Istanbul
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d cardtracker"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  app:
    build: .
    container_name: cardtracker-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://db:5432/cardtracker
      TZ: Europe/Istanbul
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  db-backup:
    image: prodrigestivill/postgres-backup-local:15
    container_name: cardtracker-db-backup
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: cardtracker
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      BACKUP_NUM_KEEP: 14
      BACKUP_FREQUENCY: 1d
      BACKUP_ON_START: "TRUE"
      BACKUP_WEEKLY_KEEP: 8
      BACKUP_MONTHLY_KEEP: 12
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  pgdata:
