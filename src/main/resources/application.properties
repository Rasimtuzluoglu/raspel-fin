# VeritabanÄḟ YapÄḟlandÄḟrmasÄḟ
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Vaadin
vaadin.launch-browser=false
vaadin.productionMode=true
vaadin.devmode.devtools.enabled=false
server.port=8080

# Logging
logging.level.org.atmosphere=warn
logging.level.org.springframework.security=info
logging.file.name=logs/cardtracker.log
logging.logback.rollingpolicy.max-file-size=50MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=1GB
logging.logback.rollingpolicy.file-name-pattern=logs/cardtracker.%d{yyyy-MM-dd}.%i.log.gz
logging.logback.rollingpolicy.clean-history-on-start=false
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,caches
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

server.address=0.0.0.0

# Session timeout (30 dakika)
server.servlet.session.timeout=30m

# Upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Performans
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/json,application/javascript,text/javascript

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# PWA
app.pwa.name=Raspel Finans YÃ¶netimi
app.pwa.shortname=Raspel Finans

# Cache
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=300s
