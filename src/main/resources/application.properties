# VeritabanÄą YapÄąlandÄąrmasÄą
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Vaadin
vaadin.launch-browser=false
vaadin.productionMode=true
vaadin.devmode.devtools.enabled=false
server.port=8080

# Logging
logging.level.org.atmosphere=warn
logging.level.org.springframework.security=info
logging.file.name=logs/cardtracker.log

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

server.address=0.0.0.0

# Session timeout (30 dakika)
server.servlet.session.timeout=30m

# Upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Performans
spring.main.lazy-initialization=true
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/json,application/javascript,text/javascript
